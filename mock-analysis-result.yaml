# Mock AnalysisResult for local development and testing.
#
# Usage:
#   1. Get the target Proposal name and UID:
#      oc -n openshift-lightspeed get proposals.agentic.openshift.io -o custom-columns=NAME:.metadata.name,UID:.metadata.uid
#
#   2. Update the ownerReferences below with the correct UID and name.
#
#   3. Apply:
#      oc apply -f mock-analysis-result.yaml
#
#   4. Patch the parent Proposal's status to reference this result:
#      oc -n openshift-lightspeed patch --subresource status proposals.agentic.openshift.io <PROPOSAL-NAME> \
#        --type merge -p '{"status":{"conditions":[{"type":"Analyzed","status":"True","reason":"AnalysisComplete","message":"Upgrade analysis completed successfully.","lastTransitionTime":"2026-06-01T15:00:00Z"}],"steps":{"analysis":{"conditions":[{"type":"Complete","status":"True","reason":"Succeeded","message":"Analysis finished with 1 option.","lastTransitionTime":"2026-06-01T15:00:00Z"}],"results":[{"name":"<PROPOSAL-NAME>-analysis-1","outcome":"Succeeded"}]}}}}'

apiVersion: agentic.openshift.io/v1alpha1
kind: AnalysisResult
metadata:
  # Name must match the results[].name referenced from the parent Proposal status
  name: ota-5-0-0-0-ci-2026-05-31-043410-to-5-0-1-analysis-1
  namespace: openshift-lightspeed
  ownerReferences:
    - apiVersion: agentic.openshift.io/v1alpha1
      kind: Proposal
      # UPDATE these to match your cluster's Proposal
      name: ota-5-0-0-0-ci-2026-05-31-043410-to-5-0-1
      uid: f1856c25-e7d1-4c91-89b8-1d96f3b5e826
      controller: true
      blockOwnerDeletion: true
spec:
  proposalName: ota-5-0-0-0-ci-2026-05-31-043410-to-5-0-1
status:
