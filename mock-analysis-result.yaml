    - type: Complete
      status: "True"
      reason: Succeeded
      message: Analysis completed successfully
      lastTransitionTime: "2026-06-01T15:00:00Z"
  options:
    - title: "Update to 5.0.1"
      summary: "Patch update from 5.0.0-0.ci to 5.0.1 — low risk, ~45 min downtime."
      diagnosis:
        summary: |
          Cluster is healthy and ready for upgrade. All cluster operators are available.
          No deprecated APIs detected in active workloads. OLM operators are compatible
          with the target version.
        rootCause: "Routine patch update with no known regressions."
        confidence: High
      proposal:
        description: |
          This is a standard z-stream patch update. The cluster version operator will
          orchestrate the update by rolling out new machine configs and operator versions.
          Expected total time is approximately 45 minutes.
        risk: Low
        estimatedImpact: "~45 minutes"
        reversible: Reversible
        actions:
          - type: update
            description: "Set desiredUpdate to 5.0.1 on the ClusterVersion resource"
          - type: monitor
            description: "Monitor cluster operator rollout progress"
        rollbackPlan:
          description: "Roll back by setting desiredUpdate to the previous version"
          command: "oc adm upgrade --to=5.0.0"
      verification:
        description: "Post-upgrade verification checks"
        steps:
          - name: cluster-operators-available
            type: command
            command: "oc get co -o json | jq '.items[] | select(.status.conditions[] | select(.type==\"Available\" and .status!=\"True\")) | .metadata.name'"
            expected: "All cluster operators should report Available=True"
          - name: cluster-version-updated
            type: command
            command: "oc get clusterversion version -o jsonpath='{.status.history[0].version}'"
            expected: "5.0.1"
          - name: nodes-ready
            type: command
            command: "oc get nodes -o json | jq '.items[] | select(.status.conditions[] | select(.type==\"Ready\" and .status!=\"True\")) | .metadata.name'"
            expected: "All nodes should report Ready=True"
      rbac:
        clusterScoped:
          - apiGroups: ["config.openshift.io"]
            resources: ["clusterversions"]
            verbs: ["get", "update", "patch"]
            justification: "Required to set desiredUpdate on the ClusterVersion resource"
          - apiGroups: ["config.openshift.io"]
            resources: ["clusteroperators"]
            verbs: ["get", "list", "watch"]
            justification: "Required to monitor cluster operator health during upgrade"
        namespaceScoped:
          - apiGroups: [""]
            resources: ["pods"]
            verbs: ["get", "list"]
            justification: "Required to verify pod health in openshift-lightspeed namespace"
      components:
        - type: ota_readiness_summary
          decision: recommend
          checks:
            - name: Cluster Operators
              status: pass
              detail: "All 36 cluster operators are Available=True, Degraded=False"
            - name: Node Health
              status: pass
              detail: "All 6 nodes are Ready"
            - name: API Compatibility
              status: pass
              detail: "No deprecated APIs detected in active workloads"
            - name: OLM Operators
              status: pass
              detail: "All 3 OLM operators are compatible with 5.0.1"
            - name: Certificate Validity
              status: pass
              detail: "All serving certificates are valid for at least 30 days"
        - type: ota_finding
          severity: info
          check: operator_health
          detail: "Cluster operator 'insights' is disabled (expected on disconnected clusters)"
        - type: ota_olm_operator_status
          operators:
            - name: elasticsearch-operator
              namespace: openshift-operators-redhat
              displayName: "OpenShift Elasticsearch Operator"
